services:
  db:
    image: postgres:15-alpine
    container_name: resisus_db
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: resisus_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - resisus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resisus_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - MOCK_ENABLED=True
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/resisus_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - resisus_network

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resisus_web
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    networks:
      - resisus_network

volumes:
  postgres_data:

networks:
  resisus_network:
    driver: bridge